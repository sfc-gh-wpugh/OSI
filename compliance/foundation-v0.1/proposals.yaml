# OSI Foundation v0.1 — Proposal Registry
# -----------------------------------------------------------------------
# Mirrors §10 of ../../proposals/foundation-v0.1/Proposed_OSI_Semantics.md. Every
# entry is either:
#
#   * status: foundation     — IN scope for v0.1; engines MUST implement
#   * status: deferred       — OUT of scope; rejected at parse time with
#                              E_DEFERRED_KEY_REJECTED (D-009).
#
# Test metadata.yaml files reference these IDs via `required_features:`.
# A test that references an unknown ID is a CI failure.
#
# Adapters advertise the proposals they implement via
# `enabled_proposals.yaml` (or equivalent) per the harness contract.
# A Foundation-only adapter advertises every `status: foundation` ID
# and rejects every `status: deferred` ID with E_DEFERRED_KEY_REJECTED.

version: "0.1"

proposals:
  # -------- Foundation (v0.1) — required for every conforming engine --
  - id: two_query_shapes
    status: foundation
    title: Aggregation vs Scalar query shapes (Fields clause)
    spec_ref: ../../proposals/foundation-v0.1/Proposed_OSI_Semantics.md#5.1
    decisions: [D-001, D-010, D-011, D-023]
  - id: routing_by_expression_shape
    status: foundation
    title: Predicate routing by resolved expression shape (no role:)
    spec_ref: ../../proposals/foundation-v0.1/Proposed_OSI_Semantics.md#6.3
    decisions: [D-005, D-012]
  - id: implicit_home_grain_aggregation_rejection
    status: foundation
    title: Implicit home-grain aggregation in field expressions is rejected (E_AGGREGATE_IN_FIELD)
    spec_ref: ../../proposals/foundation-v0.1/Proposed_OSI_Semantics.md#4.3
    rejection_code: E_AGGREGATE_IN_FIELD
    decisions: [D-003]
    # D-003 and D-015 are both struck/deferred in Appendix B; the
    # Foundation's active surface is the rejection rule (any aggregate
    # in a field body MUST raise E_AGGREGATE_IN_FIELD per §4.3 /
    # Appendix C). Per-strategy equivalence (D-015) returns when
    # §10's grain-aware-functions proposal lands.
  - id: cross_grain_aggregates
    status: foundation
    title: Single-step cross-grain aggregates over 1:N (nested form is deferred per D-020(c)/D-027(d))
    spec_ref: ../../proposals/foundation-v0.1/Proposed_OSI_Semantics.md#4.5
    decisions: [D-020, D-024]
  - id: default_join_shapes
    status: foundation
    title: Default LEFT for N:1, FULL OUTER stitch for incompatible-root multi-fact
    spec_ref: ../../proposals/foundation-v0.1/Proposed_OSI_Semantics.md#6.6
    decisions: [D-001, D-004, D-008]
  - id: bridge_dedup
    status: foundation
    title: Bridge resolution materializes distinct (fact, group-key) in a single-pass aggregate (every category)
    spec_ref: ../../proposals/foundation-v0.1/Proposed_OSI_Semantics.md#6.8.1
    decisions: [D-026, D-027]
  - id: decomposition_safety
    status: foundation
    title: E_UNSAFE_REAGGREGATION fires only when the chosen plan forces decomposition the aggregate cannot survive (chasm pre-agg / stitch — bridge plan is single-pass and not in scope)
    spec_ref: ../../proposals/foundation-v0.1/Proposed_OSI_Semantics.md#6.2
    decisions: [D-022]
  - id: identifier_resolution
    status: foundation
    title: Global / dataset-scoped namespace, ambiguous-path / no-path errors
    spec_ref: ../../proposals/foundation-v0.1/Proposed_OSI_Semantics.md#4.6
    decisions: [D-006, D-018, D-019]
  - id: window_functions_standard
