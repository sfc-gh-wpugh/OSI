# Foundation Conformance Decisions — runnable test mapping.
#
# Mirrors Appendix B of ../../proposals/foundation-v0.1/Proposed_OSI_Semantics.md.
# Every D-NNN listed there has at least one row here pinning it to a
# T-NNN test case under tests/. The runner emits
# results/decisions_coverage.md after every run so gaps are visible.
#
# Status:
#   * must_pass — the engine MUST pass every T-NNN test pinned to this
#     decision; failure is a Foundation conformance failure.
#   * xfail    — the test is shipped but expected to fail until the
#     named sprint flips it; xfail_pinned_to identifies the sprint.

