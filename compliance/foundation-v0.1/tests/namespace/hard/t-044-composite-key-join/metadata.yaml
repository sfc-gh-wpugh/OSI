name: t-044-composite-key-join
description: >-
  A composite primary/foreign key join (``store_id``, ``sku``)
  requires both components in the emitted ``ON`` clause. This is a
  path-resolution / join-shape concern (§6.6, §6.9), not a deferred
  relationship key — D-009 covers feature flags such as
  ``referential_integrity`` / ``condition`` / ``asof``, which
  composite equi-keys are not.
