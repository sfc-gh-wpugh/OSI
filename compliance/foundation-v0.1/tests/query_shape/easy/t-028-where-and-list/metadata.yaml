name: t-028-where-and-list
description: >-
  ``Where: [P1, P2]`` is conjunction (logical AND), not disjunction.
  Predicate-routing semantics are normative per §6.3; the list form
  is sugar for ``P1 AND P2``. D-014 (per-engine SQL byte-determinism)
  does NOT cover this — it is a query-shape rule.
area: query_shape
difficulty: easy
dataset: f_prelude
spec_refs:
