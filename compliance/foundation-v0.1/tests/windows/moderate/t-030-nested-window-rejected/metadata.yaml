name: t-030-nested-window-rejected
description: >-
  A window function whose argument or frame contains another window
  function is rejected with ``E_NESTED_WINDOW``. D-028(c) mandates
  a parse-level rejection because the outer grain is structurally
  ambiguous when the inner is itself a window. (Distinct from D-031
  which covers a *metric* composing another *metric* whose body
  contains a window.)
area: windows
difficulty: moderate
dataset: f_prelude
spec_refs:
  - "Proposed_OSI_Semantics.md#D-028"
  - "Proposed_OSI_Semantics.md#sec-6.10.1"
tags: [window, negative, nested]
conformance_level: foundation_v0_1
decision: D-028
test_id: T-030
expected_error: true
expected_error_code: E_NESTED_WINDOW
status: planned
xfail_reason: "Sprint S-12 — nested window rejection (D-028(c))"
