name: f_nopath_model
datasets:
  - name: orders
    source: orders
    primary_key: [id]
    fields:
      - {name: id,          expression: id,          dimension: {}}
      - {name: customer_id, expression: customer_id, dimension: {}}
      - {name: amount,      expression: amount}
  - name: inventory_movements
    source: inventory_movements
    primary_key: [movement_id]
    fields:
      - {name: movement_id,  expression: movement_id,  dimension: {}}
      - {name: warehouse_id, expression: warehouse_id, dimension: {}}
      - {name: quantity,     expression: quantity}
relationships: []
metrics:
  - {name: total_amount,   expression: "SUM(orders.amount)"}
  - {name: total_quantity, expression: "SUM(inventory_movements.quantity)"}
