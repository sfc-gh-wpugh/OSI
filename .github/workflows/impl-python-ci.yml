name: impl/python CI

on:
  push:
    branches: [main]
    paths:
      - 'impl/python/**'
      - 'compliance/**'
      - '.github/workflows/impl-python-ci.yml'
  pull_request:
    paths:
      - 'impl/python/**'
      - 'compliance/**'
      - '.github/workflows/impl-python-ci.yml'

defaults:
  run:
    working-directory: impl/python

jobs:
  check:
    name: lint + typecheck + architecture + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: make lint

      - name: Typecheck (mypy strict)
        run: make typecheck

      - name: Architecture (import-linter one-way flow)
        run: make architecture

      - name: Tests (unit + property + golden + e2e)
        run: make test

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: impl/python/htmlcov/

  mutation-algebra:
    name: mutation testing (algebra fast-path, INFRA.md §1.1.1)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run mutation testing on algebra module
        run: make mutation-fast

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-cache
          path: impl/python/.mutmut-cache/
